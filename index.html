<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Galerie Photo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Ma Galerie Photo</h1>

      <div class="search-bar" role="search">
        <input
          id="searchInput"
          type="search"
          placeholder="Rechercher (ex : montagne, ville, portrait)..."
          aria-label="Rechercher des images"
        />
        <button id="searchBtn" type="button">Rechercher</button>
        <button id="clearBtn" type="button" class="muted">Effacer</button>
      </div>
    </header>

    <main>
      <section id="gallery" class="gallery" aria-live="polite">
        <div class="photo card" data-tags="random nature paysage">
          <img src="https://picsum.photos/600?random=1" alt="Image 1" />
        </div>
        <div class="photo card" data-tags="portrait personne">
          <img src="https://picsum.photos/600?random=2" alt="Image 2" />
        </div>
        <div class="photo card" data-tags="ville architecture">
          <img src="https://picsum.photos/600?random=3" alt="Image 3" />
        </div>
        <div class="photo card" data-tags="nature montagne">
          <img src="https://picsum.photos/600?random=4" alt="Image 4" />
        </div>
        <div class="photo card" data-tags="mer plage">
          <img src="https://picsum.photos/600?random=5" alt="Image 5" />
        </div>
        <div class="photo card" data-tags="architecture moderne">
          <img src="https://picsum.photos/600?random=6" alt="Image 6" />
        </div>
      </section>

      <div id="status" class="status" aria-live="polite" hidden></div>
    </main>

    <footer>
      <p>© 2025 Ma Galerie</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
